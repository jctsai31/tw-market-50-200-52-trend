<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股市場廣度指標</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
<style>
  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --border:    #21262d;
    --text:      #e6edf3;
    --muted:     #8b949e;
    --blue:      #58a6ff;
    --orange:    #f0883e;
    --green:     #3fb950;
    --red:       #f85149;
    --accent:    #388bfd;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    min-height: 100vh;
  }

  header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-wrap: wrap;
  }

  header h1 {
    font-size: 1.4rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  #last-update {
    font-size: 0.82rem;
    color: var(--muted);
  }

  #status-badge {
    font-size: 0.75rem;
    padding: 2px 10px;
    border-radius: 12px;
    background: #1f3a2b;
    color: var(--green);
    border: 1px solid #2ea04326;
    display: none;
  }

  main {
    padding: 24px 32px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .chart-header {
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--border);
  }

  .chart-header h2 {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }

  .chart-header p {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.5;
  }

  .legend-row {
    display: flex;
    gap: 20px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    color: var(--muted);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .chart-wrap {
    width: 100%;
    height: 320px;
  }

  .stat-row {
    display: flex;
    gap: 0;
    border-top: 1px solid var(--border);
  }

  .stat-item {
    flex: 1;
    padding: 14px 20px;
    border-right: 1px solid var(--border);
  }
  .stat-item:last-child { border-right: none; }

  .stat-label {
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .stat-value {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .stat-sub {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 2px;
  }

  #loading {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 100;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #loading p { font-size: 0.85rem; color: var(--muted); }

  #error-msg {
    display: none;
    padding: 20px 32px;
    color: var(--red);
    font-size: 0.85rem;
  }

  @media (max-width: 600px) {
    header, main { padding: 16px; }
    .chart-wrap { height: 260px; }
    .stat-row { flex-wrap: wrap; }
    .stat-item { min-width: 50%; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>載入資料中…</p>
</div>

<div id="error-msg"></div>

<header>
  <h1>台股市場廣度指標</h1>
  <span id="last-update"></span>
  <span id="status-badge">● 即時</span>
</header>

<main>
  <!-- 圖一：MA 穿越 -->
  <div class="chart-card">
    <div class="chart-header">
      <h2>均線廣度 — 收盤價 &gt; 50MA / 200MA 個股數</h2>
      <p>統計每日收盤價高於自身 50 日或 200 日均線的個股總數（不含 ETF、特別股、基金）</p>
      <div class="legend-row">
        <div class="legend-item">
          <div class="legend-dot" style="background:var(--blue)"></div>
          <span>收盤 &gt; 50MA</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:var(--orange)"></div>
          <span>收盤 &gt; 200MA</span>
        </div>
      </div>
    </div>
    <div class="chart-wrap" id="chart-ma"></div>
    <div class="stat-row">
      <div class="stat-item">
        <div class="stat-label">最新日期</div>
        <div class="stat-value" id="ma-date" style="font-size:1rem">—</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">高於 50MA</div>
        <div class="stat-value" id="ma-above50" style="color:var(--blue)">—</div>
        <div class="stat-sub" id="ma-pct50">— %</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">高於 200MA</div>
        <div class="stat-value" id="ma-above200" style="color:var(--orange)">—</div>
        <div class="stat-sub" id="ma-pct200">— %</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">納入個股數</div>
        <div class="stat-value" id="ma-total" style="font-size:1.1rem">—</div>
      </div>
    </div>
  </div>

  <!-- 圖二：52週新高低 -->
  <div class="chart-card">
    <div class="chart-header">
      <h2>52 週新高低 — 創新高 / 新低個股數</h2>
      <p>統計每日收盤價創近 52 週（252 個交易日）新高或新低的個股總數</p>
      <div class="legend-row">
        <div class="legend-item">
          <div class="legend-dot" style="background:var(--green)"></div>
          <span>52 週新高</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:var(--red)"></div>
          <span>52 週新低</span>
        </div>
      </div>
    </div>
    <div class="chart-wrap" id="chart-52w"></div>
    <div class="stat-row">
      <div class="stat-item">
        <div class="stat-label">最新日期</div>
        <div class="stat-value" id="w52-date" style="font-size:1rem">—</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">52 週新高</div>
        <div class="stat-value" id="w52-high" style="color:var(--green)">—</div>
        <div class="stat-sub" id="w52-pct-high">— %</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">52 週新低</div>
        <div class="stat-value" id="w52-low" style="color:var(--red)">—</div>
        <div class="stat-sub" id="w52-pct-low">— %</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">納入個股數</div>
        <div class="stat-value" id="w52-total" style="font-size:1.1rem">—</div>
      </div>
    </div>
  </div>
</main>

<script>
const COLORS = {
  blue:   '#58a6ff',
  orange: '#f0883e',
  green:  '#3fb950',
  red:    '#f85149',
  grid:   '#21262d',
  text:   '#8b949e',
  tooltip:'#1c2128',
};

// ── 取最近一年資料 ───────────────────────────────────────────────────
function filterLastYear(records) {
  const now   = new Date();
  const oneYr = new Date(now);
  oneYr.setFullYear(oneYr.getFullYear() - 1);
  return records.filter(r => new Date(r.date) >= oneYr);
}

// ── 通用 ECharts option ──────────────────────────────────────────────
function buildOption(dates, series) {
  return {
    backgroundColor: 'transparent',
    grid: { top: 20, right: 20, bottom: 60, left: 60, containLabel: false },
    tooltip: {
      trigger: 'axis',
      backgroundColor: COLORS.tooltip,
      borderColor: '#30363d',
      borderWidth: 1,
      textStyle: { color: '#e6edf3', fontSize: 12 },
      axisPointer: { lineStyle: { color: '#388bfd44' } },
    },
    xAxis: {
      type: 'category',
      data: dates,
      axisLine:  { lineStyle: { color: COLORS.grid } },
      axisTick:  { show: false },
      axisLabel: {
        color: COLORS.text,
        fontSize: 11,
        rotate: 0,
        formatter: v => v.slice(0, 7),   // YYYY-MM
        interval: 'auto',
      },
    },
    yAxis: {
      type: 'value',
      splitLine: { lineStyle: { color: COLORS.grid, type: 'dashed' } },
      axisLabel: { color: COLORS.text, fontSize: 11 },
    },
    dataZoom: [
      {
        type: 'slider',
        bottom: 4,
        height: 22,
        borderColor: COLORS.grid,
        fillerColor: '#388bfd18',
        handleStyle: { color: '#388bfd' },
        textStyle: { color: COLORS.text },
        start: 0, end: 100,
      },
      { type: 'inside' },
    ],
    series,
  };
}

function makeSeries(name, data, color) {
  return {
    name,
    type: 'line',
    data,
    smooth: 0.3,
    symbol: 'none',
    lineStyle: { color, width: 1.8 },
    areaStyle: {
      color: {
        type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
        colorStops: [
          { offset: 0, color: color + '28' },
          { offset: 1, color: color + '00' },
        ],
      },
    },
  };
}

// ── 更新統計數字卡 ───────────────────────────────────────────────────
function updateStats(last, ids, colorKeys) {
  document.getElementById(ids.date).textContent  = last.date;
  document.getElementById(ids.v1).textContent    = last[ids.k1].toLocaleString();
  document.getElementById(ids.v2).textContent    = last[ids.k2].toLocaleString();
  document.getElementById(ids.tot).textContent   = last.total.toLocaleString();
  document.getElementById(ids.p1).textContent    = (last[ids.k1] / last.total * 100).toFixed(1) + ' %';
  document.getElementById(ids.p2).textContent    = (last[ids.k2] / last.total * 100).toFixed(1) + ' %';
}

// ── 主程式 ───────────────────────────────────────────────────────────
async function main() {
  try {
    const [maRaw, w52Raw] = await Promise.all([
      fetch('data/breadth_ma.json').then(r => { if (!r.ok) throw new Error('MA data not found'); return r.json(); }),
      fetch('data/breadth_52week.json').then(r => { if (!r.ok) throw new Error('52w data not found'); return r.json(); }),
    ]);

    const ma  = filterLastYear(maRaw);
    const w52 = filterLastYear(w52Raw);

    // 隱藏 loading
    document.getElementById('loading').style.display = 'none';

    // 最後更新時間
    const lastDate = ma.at(-1)?.date ?? '';
    document.getElementById('last-update').textContent = lastDate ? `最後更新：${lastDate}` : '';

    // ── 圖一：MA ──
    const maDates   = ma.map(r => r.date);
    const chartMA   = echarts.init(document.getElementById('chart-ma'));
    chartMA.setOption(buildOption(maDates, [
      makeSeries('收盤 > 50MA',  ma.map(r => r.above50ma),  COLORS.blue),
      makeSeries('收盤 > 200MA', ma.map(r => r.above200ma), COLORS.orange),
    ]));

    const lastMA = ma.at(-1);
    if (lastMA) {
      document.getElementById('ma-date').textContent    = lastMA.date;
      document.getElementById('ma-above50').textContent = lastMA.above50ma.toLocaleString();
      document.getElementById('ma-above200').textContent= lastMA.above200ma.toLocaleString();
      document.getElementById('ma-total').textContent   = lastMA.total.toLocaleString();
      document.getElementById('ma-pct50').textContent   = (lastMA.above50ma  / lastMA.total * 100).toFixed(1) + ' %';
      document.getElementById('ma-pct200').textContent  = (lastMA.above200ma / lastMA.total * 100).toFixed(1) + ' %';
    }

    // ── 圖二：52週 ──
    const w52Dates  = w52.map(r => r.date);
    const chart52w  = echarts.init(document.getElementById('chart-52w'));
    chart52w.setOption(buildOption(w52Dates, [
      makeSeries('52週新高', w52.map(r => r.high52w), COLORS.green),
      makeSeries('52週新低', w52.map(r => r.low52w),  COLORS.red),
    ]));

    const lastW52 = w52.at(-1);
    if (lastW52) {
      document.getElementById('w52-date').textContent     = lastW52.date;
      document.getElementById('w52-high').textContent     = lastW52.high52w.toLocaleString();
      document.getElementById('w52-low').textContent      = lastW52.low52w.toLocaleString();
      document.getElementById('w52-total').textContent    = lastW52.total.toLocaleString();
      document.getElementById('w52-pct-high').textContent = (lastW52.high52w / lastW52.total * 100).toFixed(1) + ' %';
      document.getElementById('w52-pct-low').textContent  = (lastW52.low52w  / lastW52.total * 100).toFixed(1) + ' %';
    }

    // RWD resize
    window.addEventListener('resize', () => {
      chartMA.resize();
      chart52w.resize();
    });

  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    const errEl = document.getElementById('error-msg');
    errEl.style.display = 'block';
    errEl.textContent = `⚠️ 無法載入資料：${err.message}。請確認 data/ 資料夾中的 JSON 檔案存在。`;
    console.error(err);
  }
}

main();
</script>
</body>
</html>
