name: Update Breadth Data

on:
  # 每天台灣時間 15:00（UTC 07:00）自動執行
  schedule:
    - cron: "0 7 * * 1-5"   # 週一到週五

  # 手動觸發
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests pandas yfinance

      - name: Run breadth updater
        run: |
          python scripts/fetch_and_calc.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: update breadth $(date +'%Y-%m-%d')"
          git push
